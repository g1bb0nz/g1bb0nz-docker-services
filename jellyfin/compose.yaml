include: [path: ../compose.yaml]
services:
  jellyfin:
    labels:
      traefik.enable: 'true'
      traefik.http.routers.jellyfin.middlewares: compress-response@file
      traefik.http.routers.jellyfin.tls: 'true'
      traefik.http.services.jellyfin.loadbalancer.server.port: '8096'
    extends: { file: ../service-templates.yaml, service: custom-io }
    image: lscr.io/linuxserver/jellyfin:latest
    ports:
      - { name: client-discovery, published: 7359, target: 7359, protocol: udp }
    volumes:
      - { type: volume, source: jellyfin_config, target: /config }
    environment:
      JELLYFIN_PublishedServerUrl: https://jellyfin.${HOST_FQDN:?}
    hostname: jellyfin
    healthcheck: { test: 'curl --silent --show-error --fail http://localhost:8096/health || exit 1' }
volumes:
  jellyfin_config: { }
