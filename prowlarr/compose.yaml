include: [path: ../compose.yaml]
services:
  prowlarr:
    labels:
      traefik.enable: 'true'
      traefik.http.routers.prowlarr.middlewares: compress-response@file
      traefik.http.routers.prowlarr.tls: 'true'
      traefik.http.services.prowlarr.loadbalancer.server.port: '9696'
    extends: { file: ../service-templates.yaml, service: custom-io }
    image: lscr.io/linuxserver/prowlarr:latest
    volumes:
      - { type: volume, source: prowlarr_config, target: /config }
    secrets:
      - { source: prowlarr_database-password, target: database-password }
      - { source: prowlarr_api-key, target: api-key }
    environment:
      PROWLARR__APP__LAUNCHBROWSER: 'False'
      FILE__PROWLARR__AUTH__APIKEY: /run/secrets/api-key
      PROWLARR__AUTH__METHOD: Forms
      PROWLARR__AUTH__REQUIRED: Enabled
      PROWLARR__LOG__LEVEL: info
      PROWLARR__LOG__ANALYTICSENABLED: 'False'
      PROWLARR__LOG__DBENABLED: 'False'
      PROWLARR__POSTGRES__HOST: postgres
      PROWLARR__POSTGRES__USER: prowlarr
      FILE__PROWLARR__POSTGRES__PASSWORD: /run/secrets/database-password
      PROWLARR__POSTGRES__MAINDB: prowlarr
    hostname: prowlarr
    healthcheck: { test: 'curl --silent --show-error --fail http://localhost:9696/ping || exit 1' }
volumes:
  prowlarr_config: { }
secrets:
  prowlarr_database-password: { file: ../.secrets/prowlarr_database-password }
  prowlarr_api-key: { file: ../.secrets/prowlarr_api-key }
