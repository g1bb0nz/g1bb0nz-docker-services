services:
  recyclarr:
    # *arr integration:
    #configs:
      #- { source: recyclarr_sonarr-config, target: /config/configs/sonarr.yaml, mode: 0644 }
    #secrets:
      #- { source: sonarr_api-key }
configs:
  recyclarr_sonarr-config:
    content: |
      # yaml-language-server: $$schema=https://schemas.recyclarr.dev/v8/config-schema.json
      sonarr:
        sonarr_default:
          base_url: http://sonarr:8989
          api_key: !file /run/secrets/sonarr_api-key
          # Media Naming Configuration
          media_naming:
            series: default
            season: default
            episodes: { rename: true, standard: default, daily: default, anime: default }
          # Media Management Configuration
          media_management:
            propers_and_repacks: do_not_prefer
          # Quality Definition Configuration     
          quality_definition: { type: series }
          # Quality Profile Configuration
          quality_profiles:
            - trash_id: 72dae194fc92bf828f32cde7744e51a1  # WEB-1080p
              reset_unmatched_scores: { enabled: true }
          # Custom Format Configuration
          delete_old_custom_formats: true
          custom_format_groups:
            add:
              - trash_id: f4a0410a1df109a66d6e47dcadcce014  # [Optional] Miscellaneous
                select:
                  - 32b367365729d530ca1c124a0b180c64 # Bad Dual Groups
                  - 82d40da2bc6923f41e14394075dd4b03 # No-RlsGroup
                  - e1a997ddb54e3ecbfe06341ad323c458 # Obfuscated
# *arr integration:
#secrets:
  #sonarr_api-key: { file: ../.secrets/sonarr_api-key }
